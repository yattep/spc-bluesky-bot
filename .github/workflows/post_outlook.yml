name: Post SPC Outlook

on:
  schedule:
    # Every 15 minutes as a backup runner — hash check prevents duplicates
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  post-outlook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Restore feed state
        uses: actions/cache@v4
        with:
          path: data/feed_state.json
          key: spc-feed-state-${{ github.run_id }}
          restore-keys: spc-feed-state-

      - name: Check and post outlook
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          FEED_STATE_PATH: data/feed_state.json
          RUN_ONCE: "1"
        run: python post_spc_outlook.py
