name: Post SPC Outlooks to Bluesky

on:
  schedule:
    # Morning run at 13:30 UTC (9:30am EDT / 8:30am CDT)
    # Shortly after SPC's morning 13Z update
    - cron: "30 13 * * *"
    # Afternoon run at 20:30 UTC (4:30pm EDT / 3:30pm CDT)
    # Shortly after SPC's afternoon 20Z update
    - cron: "30 20 * * *"
  workflow_dispatch:
    # Allows you to manually trigger a run from the GitHub Actions tab

jobs:
  post-outlooks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pillow geopandas

      - name: Run bot
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: python post_spc_outlook.py
